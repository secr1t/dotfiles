# Christmas Kitty Theme
# cozy winter look — pine green, holly red, snow white, and frosty blue
allow_remote_control yes
listen_on unix:/tmp/kitty

# vim:ft=kitty

foreground              #e6eef5
background              #121720
selection_foreground    #121720
selection_background    #c1e1ff

cursor                  #c1e1ff
cursor_text_color       #121720

url_color               #9dc7ff

active_border_color     #ff7070
inactive_border_color   #3a4959
bell_border_color       #c1e1ff

wayland_titlebar_color system
macos_titlebar_color system

active_tab_foreground   #0d1118
active_tab_background   #c1e1ff
inactive_tab_foreground #e6eef5
inactive_tab_background #1a212e
tab_bar_background      #0d1118

mark1_foreground #121720
mark1_background #ff7070
mark2_foreground #121720
mark2_background #c1e1ff
mark3_foreground #121720
mark3_background #67e6b1

# The 16 terminal colors

# black
color0  #202833
color8  #3a4959

# red — holly red
color1  #ff7070
color9  #ff5555

# green — pine
color2  #67e6b1
color10 #4ccca3

# yellow — golden light
color3  #ffe59d
color11 #f9d97d

# blue — frosty sky
color4  #9dc7ff
color12 #7bb6ff

# magenta — festive accent
color5  #d890ff
color13 #c27cff

confirm_os_window_close 0

